name: Apply Mapbox profile patch

on:
  push:
    branches:
      - feature/mapbox-directions-profile
    paths:
      - tools/apply_mapbox_profile_patch.py
      - .github/workflows/apply-mapbox-profile-patch.yml

permissions:
  contents: write

jobs:
  apply:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: feature/mapbox-directions-profile
      - name: Apply one-time patch
        run: python tools/apply_mapbox_profile_patch.py
      - name: Commit patched index
        run: |
          if git diff --quiet; then
            echo "No changes to commit."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A index.html tools/apply_mapbox_profile_patch.py .github/workflows/apply-mapbox-profile-patch.yml
          git commit -m "Add Mapbox route profile controls"
          git push
